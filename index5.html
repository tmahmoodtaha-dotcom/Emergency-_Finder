<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا - Emergency Finder</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style5.css">
</head>
<body>

    <div class="contact-page-wrapper">
        
        <section class="contact-info-section">
            <h2>معلومات التواصل</h2>
            
            <div class="info-card">
                <i class="fas fa-phone-alt"></i>
                <span>رقم الهاتف:</span>
                <a href="tel:+201158554812">+20 1158554812</a>
            </div>

            <div class="info-card">
                <i class="fas fa-envelope"></i>
                <span>البريد الإلكتروني:</span>
                <a href="mailto:menna@example.com">menna@example.com</a>
            </div>

            <div class="info-card">
                <i class="fas fa-map-marker-alt"></i>
                <span>الموقع:</span>
                <p>القاهرة، مصر - أكاديمية المستقبل</p>
            </div>

            <div class="social-media-links">
                <h3>تابعنا على</h3>
                <div class="social-icons">
                    <a href="#" class="icon-fb"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="icon-tw"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="icon-insta"><i class="fab fa-instagram"></i></a>
                    <a href="https://wa.me/201158554812" class="icon-wa"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        </section>

        <section class="contact-form-section">
            <h2>أرسل لنا رسالة مباشرة</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">الاسم بالكامل:</label>
                    <input type="text" id="name" name="name" placeholder="أدخل اسمك" required>
                </div>

                <div class="form-group">
                    <label for="email">البريد الإلكتروني:</label>
                    <input type="email" id="email" name="email" placeholder="example@mail.com" required>
                </div>

                <div class="form-group">
                    <label for="message">رسالتك:</label>
                    <textarea id="message" name="message" rows="5" placeholder="كيف يمكننا مساعدتك؟" required></textarea>
                </div>

                <button type="submit" class="submit-button">إرسال الرسالة الآن</button>
            </form>
        </section>

        <footer class="page-footer">
            <a href="index1.html" class="back-home-link">العودة إلى الصفحة الرئيسية</a>
        </footer>

    </div>

    <script>
        document.getElementById('contactForm').onsubmit = function(e) {
            e.preventDefault();
            alert('تم استلام رسالتك بنجاح! شكراً لتواصلك معنا.');
            this.reset();
        };
    </script>

</body>
</html>
